name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Allow the heavy e2e job to be triggered on demand and nightly, kept off the fast PR path.
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  # Fast feedback (~2-3 min): compile everything + Spotless format check, no containers. Surfaces
  # compile/format breakage in seconds instead of waiting out the full Testcontainers suite below.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Compile + format check
        run: ./gradlew compileJava compileTestJava spotlessCheck --stacktrace

  build:
    # The heavy lane: full Testcontainers integration suite. Runs in parallel with `check`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Build
        # The default build excludes the @Tag("e2e") full-stack tests (heavy image pulls); only the
        # e2e module's compileTestJava runs here, proving the e2e wiring stays sound on every PR.
        # `test` is finalizedBy `jacocoTestReport`, so per-module coverage reports are produced here.
        run: ./gradlew build --stacktrace
      - name: Coverage summary + badge
        if: always()
        continue-on-error: true
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-coverage-badge: true
          badges-directory: .github/badges
          jacoco-csv-file: >-
            starters/*/build/reports/jacoco/test/jacocoTestReport.csv
            examples/*/build/reports/jacoco/test/jacocoTestReport.csv
            examples/acme-bank/*/build/reports/jacoco/test/jacocoTestReport.csv
      - name: Upload coverage HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-reports
          path: '**/build/reports/jacoco/test/html'
          if-no-files-found: warn

  supply-chain:
    # Supply-chain hygiene: an aggregate CycloneDX SBOM + a Trivy filesystem vulnerability scan.
    # Independent of the test lanes; fast (no containers, no tests).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Generate CycloneDX SBOM
        run: ./gradlew cyclonedxBom --stacktrace
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: |
            build/reports/bom.json
            build/reports/bom.xml
          if-no-files-found: warn
      - name: Trivy filesystem scan (dependencies + config)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # Report-only: surface findings in the Security tab, don't fail the build on known CVEs.
          exit-code: '0'
      - name: Upload Trivy results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  e2e:
    # Full-stack end-to-end: brings up the whole compose.bank.yaml via Testcontainers and drives the
    # saga through the gateway with a real Keycloak token. Heavy (image pulls + image builds), so it
    # runs only nightly / on demand — never on the fast PR build above.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Build the service boot jars
        # ComposeContainer.withBuild(true) builds the service images from these jars.
        run: ./gradlew bankJars --stacktrace
      - name: Run full-stack e2e
        run: ./gradlew :examples:acme-bank:e2e:e2eTest --stacktrace
