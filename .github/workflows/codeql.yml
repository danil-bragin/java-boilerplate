name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan, independent of activity.
    - cron: '0 4 * * 1'

jobs:
  analyze:
    name: Analyze (java)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # 'security-and-quality' is broader than the default 'security-extended'.
          queries: security-and-quality

      - uses: gradle/actions/setup-gradle@v4

      - name: Build (no tests — CodeQL only needs compilation)
        # Compile every module so CodeQL sees all bytecode; skip the heavy Testcontainers suite.
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
