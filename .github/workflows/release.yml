name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish starters to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Publish (version from the tag)
        env:
          # GITHUB_TOKEN with packages:write authorizes the GitHub Packages Maven repo — no PAT needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing starters at version $VERSION"
          # Only the :starters:* modules carry a publication; the example apps publish nothing.
          ./gradlew publish -PacmeVersion="$VERSION" --stacktrace
