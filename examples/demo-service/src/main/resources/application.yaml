spring:
  application:
    name: demo-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS:http://localhost:8081/realms/demo/protocol/openid-connect/certs}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration/{vendor}
  modulith:
    events:
      # On the JPA events path the event_publication table is owned by Flyway (V3 migration).
      republish-outstanding-events-on-restart: true
server:
  port: 8080
  shutdown: graceful
management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
resilience4j:
  retry:
    instances:
      flaky:
        max-attempts: 3
        wait-duration: 10ms
