name: acme-bank-local

# Full deployable stack: infra (Postgres, Redpanda+SR, Keycloak, Redis, otel-lgtm) + the five
# bank services built from per-service Dockerfiles. Build the jars first: `gradle bankJars`.
#
# ISSUER-URL RULE (avoids the classic Keycloak `iss` mismatch 401): every service validates tokens
# against http://keycloak:8080/realms/bank (the in-network issuer). KC_HOSTNAME is set to the FULL URL
# http://keycloak:8080 (Keycloak hostname-v2): the frontend AND backchannel URLs are pinned to that
# constant, so EVERY minted token carries iss=http://keycloak:8080/realms/bank regardless of which host
# the token endpoint was called from. This makes a token fetched from the HOST via the mapped port
# (localhost:8082) valid to the services too — which the e2e relies on (it fetches from the host).

services:
  postgres:
    image: postgres:16-alpine
    # BANK-19b: raised 512m -> 768m to fund the tuned shared_buffers (256MB) + WAL buffers (64MB) +
    # per-connection work_mem without starving the page cache. NOTE: the VM RAM was the gating constraint.
    # BANK-20: the user raised the Docker VM to ~24 GiB, removing the RAM starvation that gated BANK-19b.
    # Postgres mem_limit 768m -> 5g funds shared_buffers 256MB -> 3GB (see postgresql.tuning.conf) + the
    # larger backend-process count from the 3 gateway replicas' pools (max_connections 200 -> 300), with
    # the page cache no longer starved. WAL/checkpoint/group-commit + synchronous_commit=on unchanged.
    mem_limit: 5g
    # BANK-19b: mount the hardware-tuned config (shared_buffers/WAL/checkpoint + GROUP COMMIT for
    # money-safe fsync batching; synchronous_commit stays `on` for money). `-c config_file=` layers it
    # over the image's postgresql.conf. pg_stat_statements is preloaded for the re-bench/diagnosis.
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.tuning.conf
    environment:
      POSTGRES_DB: bank
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
    volumes:
      # Creates one database per service on first start (gateway/transfers/accounts/...).
      - ./db/init-multidb.sh:/docker-entrypoint-initdb.d/init-multidb.sh:ro
      # BANK-19b hardware-tuned config (money-safe: synchronous_commit=on, group commit for fsync batching).
      - ./db/postgresql.tuning.conf:/etc/postgresql/postgresql.tuning.conf:ro
    ports: ["5432:5432"]
    healthcheck:
      # BANK-19b: probe a real per-service DB (created last by init-multidb.sh) via an actual SELECT, not
      # just `pg_isready`. `pg_isready` returns ready during the image's init TEMP-server phase (and the
      # custom `command:` shifted that timing), so a service depending on it could connect in the window
      # where the real postmaster is restarting and refuse — Flyway then failed with "Connection refused"
      # and the service exited(1). Requiring `SELECT 1` against the `transfers` DB means "healthy" only
      # once init-multidb finished AND the real server accepts connections. start_period covers init.
      test: ["CMD-SHELL", "psql -U acme -d transfers -tAc 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    # BANK-19b: the saga relay carries ~5 produced + ~10 consumed msgs/transfer; at the BANK-18 knee
    # Redpanda's single core (--smp=1) was ~55% and climbing — the next ceiling on the saga drain after
    # Postgres. BANK-19b gave it 2 cores (--smp=2) + 1.5G.
    # BANK-20: with the gateway scaled out and the write target raised toward 2k, the saga relay throughput
    # is the next likely ceiling. On the 24 GiB VM give it 4 reactor cores (--smp 2 -> 4) + 4G memory so the
    # broker keeps the 6-partition saga drain lag-bounded at the higher accept rate. mem_limit 1664m -> 4608m
    # bounds seastar's allocator at the larger --memory with headroom.
    mem_limit: 4608m
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=4
      - --memory=4G
      - --reserve-memory=0M
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"   # Kafka
      - "8081:8081"   # Schema Registry
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    mem_limit: 256m
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    # Keycloak runs its own JVM; cap it so dev-mode heap growth can't eat the service budget.
    # BANK-19b: trimmed 640m -> 512m — Keycloak only mints tokens at bench start (the diagnosis saw it at
    # ~0.16% CPU during steady load), so its idle heap is reclaimed to keep the stack within the ~7.65 GiB
    # Docker VM after the Postgres/Redpanda increases.
    mem_limit: 512m
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Pin the issuer to a constant full URL so token `iss` == the URL services validate against,
      # for callers both inside the network and on the host (see rule above). With a full-URL hostname
      # in hostname-v2 the backchannel URL equals this too, so internal service<->Keycloak calls and the
      # `iss` claim all use http://keycloak:8080.
      KC_HOSTNAME: http://keycloak:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Expose the management health endpoint on port 9000 (no hostname enforcement) for the
      # healthcheck — the realm endpoint on 8080 enforces KC_HOSTNAME and 500s on a bare request.
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realm-bank.json:/opt/keycloak/data/import/realm-bank.json:ro
    ports: ["8082:8080"]   # 8082 on the host to avoid colliding with Schema Registry on 8081
    healthcheck:
      # The Keycloak image has bash (so /dev/tcp works) but no curl/wget. Probe /health/ready on the
      # management port; "UP" appears once the realm import completes and the server is ready.
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  observability:
    image: grafana/otel-lgtm:latest
    # otel-lgtm bundles Grafana+Loki+Tempo+Mimir+Prometheus — the heaviest infra container.
    # BANK-19b: trimmed 1280m -> 768m to fund the Postgres/Redpanda increases within the ~7.65 GiB VM.
    # BANK-20: with the VM at ~24 GiB it's no longer zero-sum; restored 768m -> 1024m so the trace/metric
    # backlog from the higher write rate doesn't get reclaimed. Still OFF the money path; sampling 0.1.
    mem_limit: 1024m
    ports:
      - "3000:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/3000 && echo -e 'GET / HTTP/1.0\\r\\n\\r\\n' >&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  # ---- Services (built from per-service Dockerfiles; `gradle bankJars` first) ----

  gateway:
    build:
      context: ./gateway
    # MEMORY BUDGET (BANK-18 OOM fix): every service JVM runs `java -XX:MaxRAMPercentage=75` which
    # sizes the max heap from the *cgroup* limit. WITHOUT a per-container limit each of the five JVMs
    # reads the FULL ~8GB host and sizes its heap to ~6GB — five 6GB heaps on an 8GB host over-commit,
    # so under sustained mixed load the kernel OOM-killer fires and (the gateway being the densest
    # worker in MIXED) kills the gateway first. Pinning mem_limit makes each JVM size its heap from the
    # limit (gateway → ~768m heap) AND caps the host footprint so the stack fits ~8GB with headroom.
    # Budget (services 1.0+0.75+0.75+0.64+0.64 = 3.78G) + infra ≈ 7.4G, leaving room for the
    # co-located Gatling driver during a sweep. deploy.resources mirrors mem_limit for swarm/v2 parity.
    #
    # BANK-20: gateway CPU was the BANK-19b write limiter (3 cores maxed at the ~1,400/s knee) and the
    # gateway is STATELESS, so it is the horizontal-scaling lever. With the VM raised to ~24 GiB the
    # per-replica heap is no longer starved: mem_limit 1024m -> 1536m, and we run N replicas behind the
    # nginx LB (see the `nginx` service below) via `docker compose --scale gateway=N`. The host port is
    # removed (the LB is now the only published edge) so N replicas don't fight over host :8080.
    mem_limit: 1536m
    deploy:
      resources:
        limits:
          memory: 1536m
    depends_on:
      postgres: {condition: service_healthy}
      redpanda: {condition: service_healthy}
      redis: {condition: service_healthy}
      keycloak: {condition: service_healthy}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gateway
      SPRING_DATASOURCE_USERNAME: acme
      SPRING_DATASOURCE_PASSWORD: acme
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      OAUTH2_ISSUER_URI: http://keycloak:8080/realms/bank
      OTEL_OTLP_TRACES_ENDPOINT: http://observability:4318/v1/traces
      # Activates acme-web's RedisIdempotencyStore so idempotency holds across gateway replicas.
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      TRANSFERS_BASE_URL: http://transfers:8080
      ACCOUNTS_BASE_URL: http://accounts:8080
    # BANK-20: NO host port — nginx (below) is the only published edge so the gateway can scale to N
    # replicas (`docker compose --scale gateway=N`) without host :8080 collisions. Reachable in-network
    # at gateway:8080; Docker DNS resolves the service name to every replica IP for nginx round-robin.
    expose: ["8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # BANK-20: nginx round-robin load balancer — the new single published edge in front of the N
  # stateless gateway replicas. Config in ./nginx/gateway.conf (DNS round-robin to gateway:8080,
  # passes Authorization + Idempotency-Key verbatim, sets X-Forwarded-For). Publishes host 8080:80 so
  # the BANK-18 bench (BENCH_GATEWAY_URL default http://localhost:8080) hits the LB unchanged.
  nginx:
    image: nginx:1.27-alpine
    mem_limit: 256m
    depends_on:
      gateway: {condition: service_healthy}
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/nginx.conf:ro
    ports: ["8080:80"]   # the only published edge now
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:80/ | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  transfers:
    build:
      context: ./transfers
    # BANK-20: transfers was the RAM co-limiter at the BANK-19b knee (768m mem_limit -> ~576m heap). On the
    # 24 GiB VM raise it to 2g so the transfers JVM heap (-> ~1.5g) isn't the co-ceiling once gateway CPU is
    # relieved by the replicas. It is the first downstream the scaled-out edge pushes harder.
    mem_limit: 2g
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      postgres: {condition: service_healthy}
      redpanda: {condition: service_healthy}
      keycloak: {condition: service_healthy}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transfers
      SPRING_DATASOURCE_USERNAME: acme
      SPRING_DATASOURCE_PASSWORD: acme
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      OAUTH2_ISSUER_URI: http://keycloak:8080/realms/bank
      OTEL_OTLP_TRACES_ENDPOINT: http://observability:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  accounts:
    build:
      context: ./accounts
    # BANK-20: accounts holds the money-posting path (BANK-11 source lock, Σ=0, per-posting tx — unchanged).
    # 768m -> 2g on the 24 GiB VM so the posting consumer has heap headroom as the higher accept rate drives
    # more saga completions through it. Money semantics untouched — this is capacity, not correctness.
    mem_limit: 2g
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      postgres: {condition: service_healthy}
      redpanda: {condition: service_healthy}
      keycloak: {condition: service_healthy}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/accounts
      SPRING_DATASOURCE_USERNAME: acme
      SPRING_DATASOURCE_PASSWORD: acme
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      OAUTH2_ISSUER_URI: http://keycloak:8080/realms/bank
      OTEL_OTLP_TRACES_ENDPOINT: http://observability:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  antifraud:
    build:
      context: ./antifraud
    mem_limit: 640m
    deploy:
      resources:
        limits:
          memory: 640m
    depends_on:
      postgres: {condition: service_healthy}
      redpanda: {condition: service_healthy}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/antifraud
      SPRING_DATASOURCE_USERNAME: acme
      SPRING_DATASOURCE_PASSWORD: acme
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      OTEL_OTLP_TRACES_ENDPOINT: http://observability:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  notifications:
    build:
      context: ./notifications
    mem_limit: 640m
    deploy:
      resources:
        limits:
          memory: 640m
    depends_on:
      postgres: {condition: service_healthy}
      redpanda: {condition: service_healthy}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notifications
      SPRING_DATASOURCE_USERNAME: acme
      SPRING_DATASOURCE_PASSWORD: acme
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
      OTEL_OTLP_TRACES_ENDPOINT: http://observability:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
