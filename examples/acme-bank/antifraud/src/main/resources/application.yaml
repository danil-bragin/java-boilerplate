spring:
  application:
    name: antifraud
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/antifraud}
    username: ${SPRING_DATASOURCE_USERNAME:acme}
    password: ${SPRING_DATASOURCE_PASSWORD:acme}
    hikari:
      # BANK-19b: antifraud screens on 6 parallel lanes (transfer-requested). Raised the default pool of
      # 10 to 16 so all 6 lanes have a connection + headroom for the now-batched listener (Task 4). SUM of
      # all service pools (24+24+24+16+16=104) stays well under Postgres max_connections=200.
      maximum-pool-size: ${HIKARI_MAX_POOL:16}
      minimum-idle: ${HIKARI_MIN_IDLE:4}
      connection-timeout: 10000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration/{vendor}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Propagate the W3C `traceparent` through Kafka (producer→broker→consumer). Needs
    # micrometer-tracing-bridge-otel (from the observability starter) to write the header.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
      # BANK-16: consume transfer-requested partitions in PARALLEL — one thread per partition — so
      # different transfers are screened concurrently. Within a partition it stays single-threaded: a
      # transfer's events serialize on ONE thread, and keying by transferId preserves per-transfer order
      # and the inbox-dedup guarantee. Concurrency ≤ partition count (6).
      concurrency: ${ANTIFRAUD_LISTENER_CONCURRENCY:6}
    consumer:
      group-id: antifraud
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
        # BANK-16: never silently consume an auto-created 1-partition topic. antifraud's own KafkaAdmin
        # provisions/grows transfer-requested (and transfer-screened) to the shared partition count at
        # context refresh (SagaTopicsConfig), BEFORE the listener subscribes — so a missing topic is a
        # loud error, not a 1-partition funnel that would collapse screening throughput onto one thread.
        allow.auto.create.topics: false
        # BANK-16 latency tuning: shorten the fetch wait so a transfer-requested event is screened promptly
        # under light load, and bound the per-poll batch. Pure latency knobs — keying/inbox untouched.
        fetch.max.wait.ms: ${KAFKA_FETCH_MAX_WAIT_MS:50}
        max.poll.records: ${KAFKA_MAX_POLL_RECORDS:50}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      # BANK-16: durability is NON-NEGOTIABLE — antifraud emits transfer-screened with acks=all and the
      # idempotent producer set EXPLICITLY so they can never be silently weakened. These are the Kafka 3.x
      # defaults; pinning them makes the guarantee load-bearing in config.
      acks: all
      properties:
        enable.idempotence: true
        # Small batching window favors settle latency without trading durability (acks/idempotence above).
        linger.ms: ${KAFKA_LINGER_MS:5}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
  modulith:
    events:
      kafka:
        enable-json: false

acme:
  bank:
    topics:
      # BANK-16: ONE shared partition count for ALL saga topics. antifraud self-provisions every saga topic
      # it consumes (transfer-requested) OR produces (transfer-screened) at this count (SagaTopicsConfig) so
      # partitioning is deterministic regardless of start order — KafkaAdmin create-or-modify is idempotent.
      # Consumer concurrency stays ≤ this count.
      partitions: ${TOPIC_PARTITIONS:6}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      # BANK-19b: lowered 1.0 -> 0.1 for the capacity bench (see transfers yaml). Env-overridable.
      probability: ${TRACING_SAMPLE_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
