# =============================================================================================
# BANK-19b — Postgres tuning for the co-located benchmark host (money-safe durability KEPT).
#
# Mounted into postgres via compose `command: -c config_file=...` so it layers over the stock
# postgresql.conf. RAM-aware for the Docker VM (capped at ~7.65 GiB total; Postgres gets a 768m
# container slice — see compose.bank.yaml). Diagnosed in BANK-19b Task 1: stock postgres:16-alpine
# ran shared_buffers=128MB, max_wal_size=1GB, commit_delay=0 (no group commit), wal_compression=off.
#
# MONEY-SAFETY (NON-NEGOTIABLE): synchronous_commit STAYS `on` here — every money/record DB
# (accounts, transfers, antifraud, notifications) flushes WAL durably on commit. The per-commit
# fsync cost of the ~11-commits-per-transfer saga is cut by GROUP COMMIT (commit_delay/commit_siblings)
# which BATCHES fsyncs across concurrent commits WITHOUT weakening durability — each commit is still
# durably flushed, just grouped into one fsync. It is NOT cut by lowering synchronous_commit (that
# would risk losing acknowledged money writes). The only DB allowed synchronous_commit=off is the
# gateway transfer_view projection (a rebuildable read model, set per-database in Task 4), never here.
# =============================================================================================

# ---- Networking ----
# CRITICAL: `-c config_file=` REPLACES the whole postgresql.conf, so the docker image's
# `listen_addresses='*'` is lost and Postgres falls back to the built-in default 'localhost' — which
# binds only the loopback/unix socket. The container is then healthy to a local `psql` exec but REFUSES
# network connections (the service JVMs got "Connection to postgres:5432 refused"). Must set it here.
listen_addresses = '*'
port = 5432

# ---- Memory (BANK-20: sized to the 5g Postgres container slice on the 24 GiB VM) ----
# BANK-19b sized these to a 768m slice on the old 7.65 GiB VM. With the VM raised to ~24 GiB the
# Postgres mem_limit went 768m -> 5g (see compose.bank.yaml), so the cache scales up too: a 3 GB
# shared_buffers keeps the whole outbox/inbox/transfer/screening working set hot in-process, and the
# effective_cache_size hint reflects the larger OS page cache. WAL/checkpoint/group-commit +
# synchronous_commit=on below are UNCHANGED — this is more cache, not weaker durability.
shared_buffers = 3GB                   # ~60% of the 5g slice (was 256MB on the 768m slice). Hot pages.
effective_cache_size = 8GB             # planner hint: OS page cache available to Postgres on the VM.
work_mem = 16MB                        # bounded per sort/hash; x max_connections stays within the slice.
maintenance_work_mem = 256MB           # faster index builds / vacuum (one-at-a-time, safe to be larger).

# ---- WAL / checkpoint (kills the default max_wal_size=1GB checkpoint storms under write load) ----
max_wal_size = 4GB                     # was 1GB — default forces frequent requested checkpoints under
                                       # sustained writes (diagnosed: 224MB WAL/90s at 400/s). 4GB lets
                                       # checkpoints be timed/paced, not storm-triggered by WAL volume.
min_wal_size = 1GB
checkpoint_completion_target = 0.9     # spread checkpoint writes across the interval (smooth IO).
checkpoint_timeout = 15min             # pace timed checkpoints.
wal_buffers = 64MB                     # was 4MB — larger WAL buffer reduces buffer-full WAL flushes
                                       # under the ~11-commits/transfer fan-out.
wal_compression = on                   # compress full-page images; less WAL volume => less fsync IO.

# ---- Group commit: the money-safe fsync-batching lever (attacks ~11 fsyncs/transfer) ----
commit_delay = 80                      # microseconds a committing txn waits to batch its WAL fsync with
                                       # other concurrent commits. Durability UNCHANGED (still flushed);
                                       # this just groups the flushes. The money-safe way to cut the
                                       # per-commit fsync cost WITHOUT touching synchronous_commit.
commit_siblings = 5                    # only delay when >=5 other txns are in-flight (i.e. only under
                                       # the concurrency where batching actually pays — never adds
                                       # latency at low load).

# ---- Durability (money-safe) — pinned ON so it is load-bearing in config, never a silent default ----
synchronous_commit = on                # money DBs flush WAL durably on commit. NEVER off here.
fsync = on                             # never disable fsync — that would risk data loss on crash.
full_page_writes = on                  # torn-page protection.

# ---- Connections (matched to the right-sized Hikari pools, + headroom) ----
# BANK-20: with the gateway now running N replicas behind the LB, the gateway pool (24) is multiplied
# by replica count: at 3 replicas Σ pools = gateway 24*3 + transfers 24 + accounts 24 + antifraud 16 +
# notifications 16 = 152, plus reconciler/Flyway/admin connections. Raised 200 -> 300 so Σ pools stays
# comfortably under max_connections even at 4-5 gateway replicas (the Task 4 iteration headroom). The
# 5g Postgres slice + 3GB shared_buffers funds the extra backend processes.
max_connections = 300                  # SUM of per-service Hikari pools (× gateway replicas) + headroom.

# ---- Observability (kept for the diagnosis + re-bench) ----
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000
