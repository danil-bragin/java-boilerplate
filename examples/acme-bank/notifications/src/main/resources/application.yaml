spring:
  application:
    name: notifications
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notifications}
    username: ${SPRING_DATASOURCE_USERNAME:acme}
    password: ${SPRING_DATASOURCE_PASSWORD:acme}
    hikari:
      # BANK-19b: notifications consumes transfer-completed/failed on 6 lanes (terminal, write-light).
      # Raised the default pool of 10 to 16. SUM of all service pools stays under Postgres
      # max_connections=200.
      maximum-pool-size: ${HIKARI_MAX_POOL:16}
      minimum-idle: ${HIKARI_MIN_IDLE:4}
      connection-timeout: 10000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration/{vendor}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Propagate the W3C `traceparent` through Kafka (consumer side). Needs
    # micrometer-tracing-bridge-otel (from the observability starter).
    listener:
      observation-enabled: true
      # BANK-16: consume transfer-completed / transfer-failed partitions in PARALLEL — one thread per
      # partition — so notifications for different transfers are created concurrently. Within a partition it
      # stays single-threaded: a transfer's terminal event serializes on ONE thread, and keying by
      # transferId preserves per-transfer order and the inbox-dedup guarantee. Concurrency ≤ partition
      # count (6).
      concurrency: ${NOTIFICATIONS_LISTENER_CONCURRENCY:6}
    consumer:
      group-id: notifications
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
        schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
        # BANK-16: never silently consume an auto-created 1-partition topic. notifications' own KafkaAdmin
        # provisions/grows transfer-completed and transfer-failed to the shared partition count at context
        # refresh (SagaTopicsConfig), BEFORE the listeners subscribe — so a missing topic is a loud error,
        # not a 1-partition funnel that would collapse notification throughput onto one thread.
        allow.auto.create.topics: false
        # BANK-16 latency tuning: shorten the fetch wait so a terminal event is notified promptly under
        # light load, and bound the per-poll batch. Pure latency knobs — keying/inbox untouched.
        fetch.max.wait.ms: ${KAFKA_FETCH_MAX_WAIT_MS:50}
        max.poll.records: ${KAFKA_MAX_POLL_RECORDS:50}

acme:
  bank:
    topics:
      # BANK-16: ONE shared partition count for ALL saga topics. notifications self-provisions every saga
      # topic it consumes (transfer-completed, transfer-failed) at this count (SagaTopicsConfig) so
      # partitioning is deterministic regardless of start order — KafkaAdmin create-or-modify is idempotent.
      # Consumer concurrency stays ≤ this count.
      partitions: ${TOPIC_PARTITIONS:6}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      # BANK-19b: lowered 1.0 -> 0.1 for the capacity bench (see transfers yaml). Env-overridable.
      probability: ${TRACING_SAMPLE_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
