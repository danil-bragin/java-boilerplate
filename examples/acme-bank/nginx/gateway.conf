# BANK-20: nginx load balancer in front of the horizontally-scaled, STATELESS gateway replicas.
#
# WHY THIS IS THE LEVER: the BANK-19b write knee (~1,400/s) was bound by GATEWAY CPU (3 cores maxed)
# — the accept/proxy/JWT-validate hop, not the money path. The gateway holds NO money logic and is
# stateless across replicas (idempotency in shared Redis, the transfer_view projection in shared
# Postgres, per-partition single-writer downstream), so N replicas behind this round-robin LB
# multiply the edge CPU ceiling without touching correctness.
#
# CONNECTION REUSE IS LOAD-BEARING (BANK-20 re-bench finding): an earlier config resolved the upstream
# via a per-request `proxy_pass http://$var` variable. That form CANNOT keep upstream keepalive — nginx
# opens a fresh TCP connection to a gateway per request. At ~1800 req/s the gateways' accept backlog
# overflowed and nginx logged "upstream timed out while connecting to upstream" with the gateways only
# ~16% CPU — i.e. connection churn, not gateway CPU, was the artificial ceiling. The fix: a static
# `upstream` block with `keepalive` so nginx pools persistent HTTP/1.1 connections to the replicas.
# Docker's embedded DNS resolves the `gateway` service name to ALL --scale replica IPs at startup and
# nginx round-robins across them. (Trade-off: a static upstream resolves at startup, so a mid-run
# --scale change needs an nginx reload/recreate — acceptable for a fixed-N bench; the prod fix for
# dynamic membership is NGINX-Plus `resolve` or a service-mesh, noted not built here.)

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
}

http {
    access_log off;

    # Static upstream — Docker DNS expands `gateway` to every --scale replica IP at startup; nginx
    # round-robins. keepalive pools persistent upstream connections (the throughput fix above).
    upstream gateway_pool {
        server gateway:8080 max_fails=0;
        keepalive 512;
        keepalive_requests 100000;
        keepalive_timeout 60s;
    }

    server {
        listen 80 backlog=4096;

        # Health endpoint for the compose healthcheck (no upstream dependency).
        location = / {
            return 200 "nginx-lb ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://gateway_pool;
            # HTTP/1.1 + empty Connection header is required for upstream keepalive to engage.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Correctness-critical pass-through (verbatim).
            proxy_set_header Authorization   $http_authorization;
            proxy_set_header Idempotency-Key $http_idempotency_key;

            # Real client IP for the gateway's per-caller rate-limit key (getRemoteAddr()).
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header Host             $host;

            # Generous timeouts for the co-located bench (the gateway proxies a downstream saga hop).
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}
