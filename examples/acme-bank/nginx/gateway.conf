# BANK-20: nginx load balancer in front of the horizontally-scaled, STATELESS gateway replicas.
#
# WHY THIS IS THE LEVER: the BANK-19b write knee (~1,400/s) was bound by GATEWAY CPU (3 cores maxed)
# — the accept/proxy/JWT-validate hop, not the money path. The gateway holds NO money logic and is
# stateless across replicas (idempotency in shared Redis, the transfer_view projection in shared
# Postgres, per-partition single-writer downstream), so N replicas behind this round-robin LB
# multiply the edge CPU ceiling without touching correctness.
#
# DNS round-robin across replicas (OPEN-SOURCE nginx): `docker compose --scale gateway=N` makes the
# `gateway` service name resolve to N container IPs via Docker's embedded DNS (127.0.0.11). Open-source
# nginx resolves a `proxy_pass` variable at request time through `resolver`, and Docker's round-robin
# DNS hands out a rotating A-record order, so requests spread across the replica set. Using a variable
# (not a static upstream) also means replicas added/removed by --scale are picked up via re-resolution
# (valid=10s) without an nginx reload — the static `upstream ... resolve` form is NGINX-Plus-only.
#
# PASS-THROUGH (load-bearing): Authorization (the bearer JWT each replica validates) and
# Idempotency-Key (the shared-Redis idempotency key — a repeat to a DIFFERENT replica must still
# replay/409, never double-submit) are forwarded verbatim. X-Forwarded-For carries the real client IP
# so the gateway's per-caller rate-limit keys on the caller, not on nginx. proxy_pass_request_headers
# is on by default, so all client headers (incl. the above) propagate; we set the forwarding headers
# explicitly and never strip the two correctness-critical ones.

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    access_log off;

    # Docker's embedded DNS. valid=10s so --scale changes are re-resolved without an nginx reload.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # Health endpoint for the compose healthcheck (no upstream dependency).
        location = / {
            return 200 "nginx-lb ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            # Resolve `gateway` per-request via the resolver above; Docker round-robins the A records
            # across all --scale replicas. A variable in proxy_pass forces runtime resolution.
            set $gateway_upstream gateway;
            proxy_pass http://$gateway_upstream:8080;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Correctness-critical pass-through (verbatim).
            proxy_set_header Authorization   $http_authorization;
            proxy_set_header Idempotency-Key $http_idempotency_key;

            # Real client IP for the gateway's per-caller rate-limit key (getRemoteAddr()).
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header Host             $host;

            # Generous timeouts for the co-located bench (the gateway proxies a downstream saga hop).
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}
