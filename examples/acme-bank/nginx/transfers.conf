# BANK-21: nginx load balancer in front of the horizontally-scaled, STATELESS transfers replicas.
#
# WHY THIS IS THE LEVER: once BANK-20 relieved the gateway-edge CPU ceiling, the transfers service
# (the synchronous POST insert + the batched saga-advance consume lanes) became the new bottleneck on
# the gateway->transfers RestClient hop. transfers is stateless on the WRITE-accept side (the POST is an
# idempotent insert keyed by Idempotency-Key; the per-transfer saga state lives in Postgres; the
# consume-side distributes across replicas automatically via the `transfers` consumer GROUP). So N
# replicas behind this round-robin LB multiply the accept-side capacity without touching correctness.
#
# CONNECTION REUSE IS LOAD-BEARING (the BANK-20 finding, re-applied): the gateway's RestClient keeps a
# keepalive pool to a SINGLE host:port, so if TRANSFERS_BASE_URL pointed at the bare `transfers` service
# name the pool would pin to ONE replica and the others would idle. Pointing it at this nginx upstream
# (static `upstream` + `keepalive`) lets nginx round-robin each request across all replicas over its own
# pooled persistent connections. (Trade-off: a static upstream resolves at startup, so a mid-run --scale
# change needs an nginx reload/recreate — acceptable for a fixed-N bench.)

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
}

http {
    access_log off;

    # Static upstream — Docker DNS expands `transfers` to every --scale replica IP at startup; nginx
    # round-robins. keepalive pools persistent upstream connections (the BANK-20 throughput fix).
    upstream transfers_pool {
        server transfers:8080 max_fails=0;
        keepalive 512;
        keepalive_requests 100000;
        keepalive_timeout 60s;
    }

    server {
        listen 80 backlog=4096;

        # Health endpoint for the compose healthcheck (no upstream dependency).
        location = / {
            return 200 "nginx-transfers-lb ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://transfers_pool;
            # HTTP/1.1 + empty Connection header is required for upstream keepalive to engage.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Correctness-critical pass-through (verbatim): the relayed bearer JWT (transfers is an
            # OAuth2 resource server) and the caller's Idempotency-Key (the dedup key for the insert).
            proxy_set_header Authorization   $http_authorization;
            proxy_set_header Idempotency-Key $http_idempotency_key;

            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header Host             $host;

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}
