spring:
  application:
    name: gateway
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gateway}
    username: ${SPRING_DATASOURCE_USERNAME:acme}
    password: ${SPRING_DATASOURCE_PASSWORD:acme}
    hikari:
      # BANK-19b: the gateway runs 4 parallel projection listeners (transfer_view, 6 partitions each)
      # writing the read model on every saga hop — the diagnosis showed transfer_view UPDATE at 57k calls.
      # Default pool of 10 throttled them. Sized to 24. SUM of all service pools stays under Postgres
      # max_connections=200.
      maximum-pool-size: ${HIKARI_MAX_POOL:24}
      minimum-idle: ${HIKARI_MIN_IDLE:8}
      connection-timeout: 10000
      max-lifetime: 600000
      # BANK-19b MONEY-SAFE per-database synchronous_commit=off — GATEWAY ONLY.
      # The gateway transfer_view is a REBUILDABLE CQRS read model: it holds NO balances and enforces NO
      # money invariants (those live in accounts/transfers), every projection listener consumes from
      # `earliest`, and a crash that loses the last few unflushed projection commits is recovered by simply
      # re-consuming the saga log from Kafka — no money or record is lost. So the projection does NOT need
      # the durable-on-commit fsync; turning it off removes the projection's WAL fsync from the hot path
      # (the diagnosis showed transfer_view UPDATE at 57k calls). This is set ONLY here — accounts,
      # transfers, antifraud, notifications keep synchronous_commit=on (money + records), enforced by the
      # tuned postgresql.conf. connection-init-sql runs once per pooled connection.
      connection-init-sql: "SET synchronous_commit TO off"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration/{vendor}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Propagate the W3C `traceparent` through Kafka. Needs micrometer-tracing-bridge-otel (from the
    # observability starter) to write the header.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
      # BANK-16: each of the four projection listeners (transfer-requested/screened/completed/failed) consumes
      # its topic's partitions in PARALLEL — one thread per partition — so the read model updates for different
      # transfers concurrently. Within a partition it stays single-threaded: a transfer's events serialize on
      # ONE thread, and keying by transferId preserves per-transfer projection order. Concurrency ≤ partition
      # count (6). auto-offset-reset stays earliest (the projection rebuilds from the log).
      concurrency: ${GATEWAY_LISTENER_CONCURRENCY:6}
    consumer:
      group-id: gateway
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
        # BANK-16: never silently consume an auto-created 1-partition topic. The gateway's own KafkaAdmin
        # provisions/grows the four projection topics to the shared partition count at context refresh
        # (SagaTopicsConfig), BEFORE the projection listeners subscribe — so a missing topic is a loud
        # error, not a 1-partition funnel that would collapse the read-model projection onto one thread.
        # auto-offset-reset stays earliest: the projection rebuilds its read model from the log.
        allow.auto.create.topics: false
        # BANK-16 latency tuning: shorten the fetch wait so a projection update lands promptly under light
        # load, and bound the per-poll batch. Pure latency knobs — auto-offset-reset stays earliest; keying
        # untouched.
        fetch.max.wait.ms: ${KAFKA_FETCH_MAX_WAIT_MS:50}
        max.poll.records: ${KAFKA_MAX_POLL_RECORDS:50}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri drives OIDC discovery (jwks + iss validation). Keep ONE issuer URL
          # everywhere so the token's `iss` matches what each service validates.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8082/realms/bank}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      # BANK-19b: lowered 1.0 -> 0.1 for the capacity bench (see transfers yaml). Removes per-hop OTLP
      # export overhead from the gateway accept/proxy path (the BANK-18 top-CPU service). Env-overridable.
      probability: ${TRACING_SAMPLE_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

acme:
  bank:
    topics:
      # BANK-16: ONE shared partition count for ALL saga topics. The gateway self-provisions every saga
      # topic its read-model projection consumes (transfer-requested, transfer-screened, transfer-completed,
      # transfer-failed) at this count (SagaTopicsConfig) so partitioning is deterministic regardless of
      # start order — KafkaAdmin create-or-modify is idempotent. Consumer concurrency stays ≤ this count.
      partitions: ${TOPIC_PARTITIONS:6}
  security:
    permit-paths:
      - /actuator/health/**
      - /actuator/info
      - /openapi/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs
      - /v3/api-docs/**

gateway:
  transfers:
    base-url: ${TRANSFERS_BASE_URL:http://localhost:8081}
  accounts:
    base-url: ${ACCOUNTS_BASE_URL:http://localhost:8083}

resilience4j:
  # BANK-18: the breaker thresholds are bound to env with the CURRENT (prod-safe) values as defaults,
  # so a capacity-measurement run can relax them (compose.bench.yaml) WITHOUT changing the deployed
  # default. `compose config` without the bench override still resolves these to today's values.
  circuitbreaker:
    instances:
      transfers:
        sliding-window-size: 10
        # Prod default 10 (= the window, resilience4j's effective minimum here). The bench raises it so
        # the breaker never collects enough samples to open — relaxing the breaker for the sweep.
        minimum-number-of-calls: ${TRANSFERS_CB_MIN_CALLS:10}
        failure-rate-threshold: ${TRANSFERS_CB_FAILURE_RATE_THRESHOLD:50}
        slow-call-rate-threshold: ${TRANSFERS_CB_SLOW_CALL_RATE_THRESHOLD:100}
        slow-call-duration-threshold: ${TRANSFERS_CB_SLOW_CALL_DURATION_THRESHOLD:60s}
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        # A downstream 4xx is a client error, not a transfers-side fault: it must not count toward
        # opening the circuit. Only 5xx/timeouts/ResourceAccessException trip it.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
      accounts:
        sliding-window-size: 10
        minimum-number-of-calls: ${ACCOUNTS_CB_MIN_CALLS:10}
        failure-rate-threshold: ${ACCOUNTS_CB_FAILURE_RATE_THRESHOLD:50}
        slow-call-rate-threshold: ${ACCOUNTS_CB_SLOW_CALL_RATE_THRESHOLD:100}
        slow-call-duration-threshold: ${ACCOUNTS_CB_SLOW_CALL_DURATION_THRESHOLD:60s}
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        # A downstream 4xx is a client error, not an accounts-side fault: it must propagate as the
        # same 4xx and not count toward opening the circuit. Only 5xx/timeouts trip it.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    instances:
      transfers:
        # BANK-18: max-attempts is env-bound (default 3 — unchanged). Bench sets it to 1 so retry
        # amplification doesn't inflate offered load on the downstream during a capacity sweep.
        max-attempts: ${TRANSFERS_RETRY_MAX_ATTEMPTS:3}
        wait-duration: 200ms
        # Never retry a downstream 4xx — the request is deterministically rejected; retrying wastes
        # calls and (pre-fix) masked the 4xx as a 503 once retries were exhausted.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
      accounts:
        max-attempts: ${ACCOUNTS_RETRY_MAX_ATTEMPTS:3}
        wait-duration: 200ms
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    url: /openapi/bank-api.yaml

bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-buckets
      url: /v1/.*
      strategy: first
      http-status-code: TOO_MANY_REQUESTS
      rate-limits:
        # Bucket4j's SERVLET filter passes the HttpServletRequest as the SpEL ROOT object, so the
        # key is a method call on it — `getRemoteAddr()`. `@request.remoteAddr` (a bean reference)
        # has no matching bean and throws SpelEvaluationException on every /v1/* request.
        - cache-key: "getRemoteAddr()"
          bandwidths:
            # BANK-18: capacity/refill are env-bound (defaults = today's 100 req/min/IP — the deployed
            # policy, UNCHANGED). The bench (compose.bench.yaml) raises capacity to an effectively
            # unlimited value so a single-IP load generator isn't throttled and the MACHINE capacity is
            # measured beneath the per-caller policy. `compose config` without the override still shows
            # 100/min, confirming the production default is intact.
            - capacity: ${RATE_LIMIT_CAPACITY:100}
              time: 1
              unit: minutes
              refill-speed: greedy
