spring:
  application:
    name: gateway
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gateway}
    username: ${SPRING_DATASOURCE_USERNAME:acme}
    password: ${SPRING_DATASOURCE_PASSWORD:acme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration/{vendor}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Propagate the W3C `traceparent` through Kafka. Needs micrometer-tracing-bridge-otel (from the
    # observability starter) to write the header.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
      # BANK-16: each of the four projection listeners (transfer-requested/screened/completed/failed) consumes
      # its topic's partitions in PARALLEL — one thread per partition — so the read model updates for different
      # transfers concurrently. Within a partition it stays single-threaded: a transfer's events serialize on
      # ONE thread, and keying by transferId preserves per-transfer projection order. Concurrency ≤ partition
      # count (6). auto-offset-reset stays earliest (the projection rebuilds from the log).
      concurrency: ${GATEWAY_LISTENER_CONCURRENCY:6}
    consumer:
      group-id: gateway
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
        # BANK-16: never silently consume an auto-created 1-partition topic. The gateway's own KafkaAdmin
        # provisions/grows the four projection topics to the shared partition count at context refresh
        # (SagaTopicsConfig), BEFORE the projection listeners subscribe — so a missing topic is a loud
        # error, not a 1-partition funnel that would collapse the read-model projection onto one thread.
        # auto-offset-reset stays earliest: the projection rebuilds its read model from the log.
        allow.auto.create.topics: false
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri drives OIDC discovery (jwks + iss validation). Keep ONE issuer URL
          # everywhere so the token's `iss` matches what each service validates.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8082/realms/bank}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

acme:
  bank:
    topics:
      # BANK-16: ONE shared partition count for ALL saga topics. The gateway self-provisions every saga
      # topic its read-model projection consumes (transfer-requested, transfer-screened, transfer-completed,
      # transfer-failed) at this count (SagaTopicsConfig) so partitioning is deterministic regardless of
      # start order — KafkaAdmin create-or-modify is idempotent. Consumer concurrency stays ≤ this count.
      partitions: ${TOPIC_PARTITIONS:6}
  security:
    permit-paths:
      - /actuator/health/**
      - /actuator/info
      - /openapi/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs
      - /v3/api-docs/**

gateway:
  transfers:
    base-url: ${TRANSFERS_BASE_URL:http://localhost:8081}
  accounts:
    base-url: ${ACCOUNTS_BASE_URL:http://localhost:8083}

resilience4j:
  circuitbreaker:
    instances:
      transfers:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        # A downstream 4xx is a client error, not a transfers-side fault: it must not count toward
        # opening the circuit. Only 5xx/timeouts/ResourceAccessException trip it.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
      accounts:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        # A downstream 4xx is a client error, not an accounts-side fault: it must propagate as the
        # same 4xx and not count toward opening the circuit. Only 5xx/timeouts trip it.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    instances:
      transfers:
        max-attempts: 3
        wait-duration: 200ms
        # Never retry a downstream 4xx — the request is deterministically rejected; retrying wastes
        # calls and (pre-fix) masked the 4xx as a 503 once retries were exhausted.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
      accounts:
        max-attempts: 3
        wait-duration: 200ms
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    url: /openapi/bank-api.yaml

bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-buckets
      url: /v1/.*
      strategy: first
      http-status-code: TOO_MANY_REQUESTS
      rate-limits:
        # Bucket4j's SERVLET filter passes the HttpServletRequest as the SpEL ROOT object, so the
        # key is a method call on it — `getRemoteAddr()`. `@request.remoteAddr` (a bean reference)
        # has no matching bean and throws SpelEvaluationException on every /v1/* request.
        - cache-key: "getRemoteAddr()"
          bandwidths:
            - capacity: 100
              time: 1
              unit: minutes
              refill-speed: greedy
