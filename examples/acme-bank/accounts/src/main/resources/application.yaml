spring:
  application:
    name: accounts
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/accounts}
    username: ${SPRING_DATASOURCE_USERNAME:acme}
    password: ${SPRING_DATASOURCE_PASSWORD:acme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration/{vendor}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Propagate the W3C `traceparent` through Kafka (producer→broker→consumer) so a transfer's
    # trace spans gateway→transfers→Kafka→accounts. Needs micrometer-tracing-bridge-otel (from the
    # observability starter) to write the header.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
      # BANK-15: consume posting-requested partitions in PARALLEL — one thread per partition — so
      # different source accounts post concurrently (per-account write parallelism). Within a single
      # partition it stays single-threaded: a source account's postings serialize on ONE thread (the
      # single-writer lane). Concurrency ≤ partition count (posting-requested has 6). The BANK-11
      # pessimistic source lock + BANK-1 posting-PK anchor remain as correctness backstops, so even a
      # transient two-consumer overlap on one partition during a rebalance cannot overdraw.
      concurrency: ${ACCOUNTS_LISTENER_CONCURRENCY:6}
    consumer:
      group-id: accounts
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
        # BANK-15: never silently consume an auto-created 1-partition topic. accounts' own KafkaAdmin
        # provisions/grows posting-requested to 6 partitions at context refresh (SagaTopicsConfig),
        # BEFORE this listener subscribes — so a missing topic here is a loud error, not a 1-partition
        # funnel that would collapse per-account write parallelism onto one consumer thread.
        allow.auto.create.topics: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
  modulith:
    events:
      kafka:
        enable-json: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri drives OIDC discovery (jwks + iss validation). Keep ONE issuer URL
          # everywhere so the token's `iss` matches what each service validates.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8082/realms/bank}

acme:
  bank:
    topics:
      posting-requested:
        # BANK-15: accounts (the CONSUMER) self-provisions posting-requested at this partition count so
        # per-account write parallelism is deterministic regardless of start order or whether transfers
        # is up — KafkaAdmin create-or-modify is idempotent, so both services declaring it is fine.
        partitions: ${POSTING_REQUESTED_PARTITIONS:6}
  security:
    # Permit the network-internal, service-to-service surface without a bearer. `/internal/**` is
    # NOT exposed at the gateway edge (the gateway proxies only `/v1/**`) and accounts is not
    # published to the host in compose — so it is network-segmented, reachable only on the service
    # network. It MUST remain network-restricted in deployment.
    permit-paths:
      - /actuator/health/**
      - /actuator/info
      - /internal/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
