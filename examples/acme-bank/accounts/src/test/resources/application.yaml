spring:
  # acme-test-support puts spring-data-redis on the TEST classpath; without this exclusion Spring
  # would create a StringRedisTemplate and acme-web would select RedisIdempotencyStore, which then
  # fails to reach a (non-existent) Redis. Production runtime has no Redis here → in-memory store.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  flyway:
    locations: classpath:db/migration/postgresql
  kafka:
    consumer:
      group-id: accounts
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
  modulith:
    events:
      kafka:
        enable-json: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8082/realms/bank/protocol/openid-connect/certs

# Mirror the production permit-paths (the test application.yaml fully shadows main on the classpath).
# `/internal/**` is the network-internal posting-status query — permitted without a bearer.
acme:
  security:
    permit-paths:
      - /actuator/health/**
      - /actuator/info
      - /internal/**
