spring:
  application:
    name: transfers
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transfers}
    username: ${SPRING_DATASOURCE_USERNAME:acme}
    password: ${SPRING_DATASOURCE_PASSWORD:acme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration/{vendor}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Propagate the W3C `traceparent` through Kafka (producer→broker→consumer) so a transfer's
    # trace spans gateway→transfers→Kafka→accounts. Needs micrometer-tracing-bridge-otel (from the
    # observability starter) to write the header.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    consumer:
      group-id: transfers
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
  modulith:
    events:
      kafka:
        enable-json: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri drives OIDC discovery (jwks + iss validation). Keep ONE issuer URL
          # everywhere so the token's `iss` matches what each service validates.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8082/realms/bank}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-buckets
      url: /v1/.*
      strategy: first
      http-status-code: TOO_MANY_REQUESTS
      rate-limits:
        # Bucket4j's SERVLET filter passes the HttpServletRequest as the SpEL ROOT object, so the
        # key is a method call on it — `getRemoteAddr()`. `@request.remoteAddr` (a bean reference)
        # has no matching bean and throws SpelEvaluationException on every /v1/* request.
        - cache-key: "getRemoteAddr()"
          bandwidths:
            - capacity: 100
              time: 1
              unit: minutes
              refill-speed: greedy

acme:
  bank:
    topics:
      posting-requested:
        # BANK-15: spread source accounts across partitions so each account is a single writer on
        # one partition/consumer (per-account write parallelism). Fixed at first create — the example
        # deploys fresh. Production sets replication at the broker; dev/Redpanda is single-broker.
        partitions: ${POSTING_REQUESTED_PARTITIONS:6}
    reconciler:
      # The money-safe stuck-saga reconciler: re-drive pre-money states, reconcile POSTING against
      # the accounts ledger. A POSTING transfer is NEVER auto-failed — only accounts terminalizes money.
      enabled: ${RECONCILER_ENABLED:true}
      # How long a transfer may sit non-terminal before the reconciler nudges it (re-emits to re-drive).
      nudge-after: ${RECONCILER_NUDGE_AFTER:PT30S}
      # How long before a PRE-MONEY transfer (REQUESTED/APPROVED) is hard-failed (SAGA_TIMEOUT). A POSTING
      # transfer is never failed by the reconciler — a `posted=false` snapshot does not prove money never
      # moved (a still-in-flight posting-requested could post later); only accounts may terminalize it.
      fail-after: ${RECONCILER_FAIL_AFTER:PT5M}
      # How long an unposted POSTING transfer may sit before it is surfaced as genuinely stuck: emit the
      # `acme.saga.stuck` metric + WARN ("page a human"). State is NOT changed; re-drive continues. ≥ fail-after.
      stuck-after: ${RECONCILER_STUCK_AFTER:PT15M}
      # Cadence of the scheduled sweep (a single runner across replicas via ShedLock).
      fixed-delay: ${RECONCILER_FIXED_DELAY:PT15S}
      batch-size: 100
      accounts:
        base-url: ${ACCOUNTS_BASE_URL:http://localhost:8083}

resilience4j:
  circuitbreaker:
    instances:
      accounts-reconcile:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        # A 4xx is a deterministic client error, not an accounts-side fault: don't trip the circuit.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    instances:
      accounts-reconcile:
        max-attempts: 3
        wait-duration: 200ms
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
