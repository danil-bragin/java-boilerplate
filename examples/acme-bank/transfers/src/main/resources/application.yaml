spring:
  application:
    name: transfers
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transfers}
    username: ${SPRING_DATASOURCE_USERNAME:acme}
    password: ${SPRING_DATASOURCE_PASSWORD:acme}
    hikari:
      # BANK-19b: transfers is a HOT write-path service — the saga advances on 6 parallel listener lanes
      # (transfer-screened/ledger-posted/posting-rejected) PLUS the synchronous POST insert. The Spring
      # default pool of 10 starved those concurrent commits against the tuned Postgres. Sized to drive the
      # 6 lanes + POST + reconciler concurrently. SUM of all service pools (24+24+24+16+16=104) stays well
      # under Postgres max_connections=200 (tuning conf), with headroom.
      maximum-pool-size: ${HIKARI_MAX_POOL:24}
      minimum-idle: ${HIKARI_MIN_IDLE:8}
      connection-timeout: 10000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration/{vendor}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Propagate the W3C `traceparent` through Kafka (producer→broker→consumer) so a transfer's
    # trace spans gateway→transfers→Kafka→accounts. Needs micrometer-tracing-bridge-otel (from the
    # observability starter) to write the header.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
      # BANK-16: consume the result topics (transfer-screened, ledger-posted, posting-rejected) partitions
      # in PARALLEL — one thread per partition — so different transfers advance concurrently. Within a
      # partition it stays single-threaded: a transfer's events serialize on ONE thread, and keying by
      # transferId preserves per-transfer order and the inbox-dedup guarantee. Concurrency ≤ partition
      # count (6). The BANK-1 posting anchor / saga state machine remain the correctness backstops.
      concurrency: ${TRANSFERS_LISTENER_CONCURRENCY:6}
    consumer:
      group-id: transfers
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
        # BANK-16: never silently consume an auto-created 1-partition topic. transfers' own KafkaAdmin
        # provisions/grows every saga topic it touches to the shared partition count at context refresh
        # (SagaTopicsConfig), BEFORE its listeners subscribe — so a missing topic is a loud error, not a
        # 1-partition funnel that would collapse saga throughput onto one consumer thread.
        allow.auto.create.topics: false
        # BANK-16 latency tuning: shorten the fetch wait so a result event is delivered promptly under
        # light load, and bound the per-poll batch. Pure latency knobs — no delivery/ordering guarantee
        # changes (auto-offset-reset stays earliest; keying/inbox/anchor untouched).
        fetch.max.wait.ms: ${KAFKA_FETCH_MAX_WAIT_MS:50}
        max.poll.records: ${KAFKA_MAX_POLL_RECORDS:50}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      # BANK-16: durability is NON-NEGOTIABLE for money — acks=all (wait for in-sync replicas) and the
      # idempotent producer (no duplicate/reordered writes on retry) are set EXPLICITLY so they can never
      # be silently weakened. These are the Kafka 3.x defaults; pinning them makes the money guarantee
      # load-bearing in config, not a default.
      acks: all
      properties:
        enable.idempotence: true
        # Small batching window: linger up to a few ms to coalesce sends WITHOUT trading durability.
        # Low value (≈5ms) favors settle latency; acks/idempotence above are unaffected.
        linger.ms: ${KAFKA_LINGER_MS:5}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
  modulith:
    events:
      kafka:
        enable-json: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri drives OIDC discovery (jwks + iss validation). Keep ONE issuer URL
          # everywhere so the token's `iss` matches what each service validates.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8082/realms/bank}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      # BANK-19b: lowered 1.0 -> 0.1 for the capacity bench. 100% sampling exported a span per saga hop
      # (~15 spans/transfer) to the OTLP collector, which the diagnosis saw at ~60-100% CPU on the
      # observability container plus per-service export overhead. 10% keeps representative traces while
      # removing that hot-path cost. Env-overridable; raise to 1.0 for debugging.
      probability: ${TRACING_SAMPLE_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-buckets
      url: /v1/.*
      strategy: first
      http-status-code: TOO_MANY_REQUESTS
      rate-limits:
        # Bucket4j's SERVLET filter passes the HttpServletRequest as the SpEL ROOT object, so the
        # key is a method call on it — `getRemoteAddr()`. `@request.remoteAddr` (a bean reference)
        # has no matching bean and throws SpelEvaluationException on every /v1/* request.
        - cache-key: "getRemoteAddr()"
          bandwidths:
            # BANK-18: capacity is env-bound (default = today's 100 req/min/IP — UNCHANGED). The bench
            # (compose.bench.yaml) raises it so the gateway→transfers traffic (one source IP, hence ONE
            # shared bucket) isn't throttled to ~1.6/s — the relocated form of the BANK-13 ~5–10/s
            # artifact. `compose config` without the override still shows 100/min.
            - capacity: ${RATE_LIMIT_CAPACITY:100}
              time: 1
              unit: minutes
              refill-speed: greedy

acme:
  bank:
    topics:
      # BANK-16: ONE shared partition count for ALL saga topics. transfers self-provisions every saga topic
      # it produces (transfer-requested, posting-requested, transfer-completed, transfer-failed) OR consumes
      # (transfer-screened, ledger-posted, posting-rejected) at this count (SagaTopicsConfig). Each source
      # account/transfer hashes to one partition so a key serializes on one partition/consumer while
      # different keys spread across partitions and are consumed in parallel. Each service with the NewTopic
      # bean provisions/grows the topic to this count at startup; the example deploys fresh so it's a
      # one-time create. Growing partitions on a live keyed topic remaps keys — do it only on a drained
      # topic in production. Production sets replication at the broker; dev/Redpanda is single-broker.
      partitions: ${TOPIC_PARTITIONS:6}
    reconciler:
      # The money-safe stuck-saga reconciler: re-drive pre-money states, reconcile POSTING against
      # the accounts ledger. A POSTING transfer is NEVER auto-failed — only accounts terminalizes money.
      enabled: ${RECONCILER_ENABLED:true}
      # How long a transfer may sit non-terminal before the reconciler nudges it (re-emits to re-drive).
      nudge-after: ${RECONCILER_NUDGE_AFTER:PT30S}
      # How long before a PRE-MONEY transfer (REQUESTED/APPROVED) is hard-failed (SAGA_TIMEOUT). A POSTING
      # transfer is never failed by the reconciler — a `posted=false` snapshot does not prove money never
      # moved (a still-in-flight posting-requested could post later); only accounts may terminalize it.
      fail-after: ${RECONCILER_FAIL_AFTER:PT5M}
      # How long an unposted POSTING transfer may sit before it is surfaced as genuinely stuck: emit the
      # `acme.saga.stuck` metric + WARN ("page a human"). State is NOT changed; re-drive continues. ≥ fail-after.
      stuck-after: ${RECONCILER_STUCK_AFTER:PT15M}
      # Cadence of the scheduled sweep (a single runner across replicas via ShedLock).
      fixed-delay: ${RECONCILER_FIXED_DELAY:PT15S}
      batch-size: 100
      accounts:
        base-url: ${ACCOUNTS_BASE_URL:http://localhost:8083}

resilience4j:
  circuitbreaker:
    instances:
      accounts-reconcile:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        # A 4xx is a deterministic client error, not an accounts-side fault: don't trip the circuit.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    instances:
      accounts-reconcile:
        max-attempts: 3
        wait-duration: 200ms
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
