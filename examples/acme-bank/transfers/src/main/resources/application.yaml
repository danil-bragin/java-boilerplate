spring:
  application:
    name: transfers
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transfers}
    username: ${SPRING_DATASOURCE_USERNAME:acme}
    password: ${SPRING_DATASOURCE_PASSWORD:acme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration/{vendor}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: transfers
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
  modulith:
    events:
      kafka:
        enable-json: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri drives OIDC discovery (jwks + iss validation). Keep ONE issuer URL
          # everywhere so the token's `iss` matches what each service validates.
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8082/realms/bank}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-buckets
      url: /v1/.*
      strategy: first
      http-status-code: TOO_MANY_REQUESTS
      rate-limits:
        - cache-key: "@request.remoteAddr"
          bandwidths:
            - capacity: 100
              time: 1
              unit: minutes
              refill-speed: greedy
